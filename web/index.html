<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shrimp Editor</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #c8f0d8;
            color: #111;
            font-family: 'Merriweather', Georgia, serif;
            font-weight: 300;
            font-size: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ── Vertical centering wrapper ── */
        #center-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 24px;
            width: 100%;
        }

        /* ── Main row ── */
        #main-row {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        /* ── Editor pane ── */
        #editor-pane {
            display: flex;
            flex-direction: column;
            width: 420px;
            border: 2px solid #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0 #111;
            background: #fffde7;
        }

        /* Header row: logo + actions */
        #editor-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: #111;
            color: #fff;
            flex-shrink: 0;
        }

        #logo {
            font-size: 0.82rem;
            font-weight: 700;
            white-space: nowrap;
        }

        /* Tab bar */
        #tab-bar {
            display: flex;
            align-items: flex-end;
            gap: 2px;
            flex: 1;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 0 4px;
        }

        #tab-bar::-webkit-scrollbar {
            display: none;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px 3px 12px;
            background: #333;
            color: #aaa;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 0.7rem;
            white-space: nowrap;
            transition: background 0.1s;
            user-select: none;
        }

        .tab:hover {
            background: #444;
        }

        .tab.active {
            background: #fffde7;
            color: #111;
        }

        .tab-close {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 0.8rem;
            line-height: 1;
            opacity: 0.5;
            padding: 0 1px;
        }

        .tab-close:hover {
            opacity: 1;
        }

        /* Header action buttons */
        .hdr-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 6px;
            color: #ccc;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.7rem;
            font-weight: 400;
            padding: 3px 9px;
            white-space: nowrap;
            transition: background 0.1s;
        }

        .hdr-btn:hover {
            background: #3a3a3a;
            color: #fff;
        }

        #compile-btn {
            background: #c8f0d8;
            border: none;
            border-radius: 6px;
            color: #111;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 4px 12px;
            white-space: nowrap;
            transition: opacity 0.1s;
        }

        #compile-btn:hover {
            opacity: 0.8;
        }

        #compile-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        /* Examples dropdown */
        #examples-wrap {
            position: relative;
        }

        #examples-menu {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            background: #222;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 4px;
            min-width: 120px;
            z-index: 100;
            box-shadow: 2px 4px 12px rgba(0, 0, 0, 0.4);
        }

        #examples-menu.hidden {
            display: none;
        }

        .menu-item {
            color: #ccc;
            cursor: pointer;
            font-size: 0.72rem;
            padding: 6px 12px;
            border-radius: 5px;
        }

        .menu-item:hover {
            background: #333;
            color: #fff;
        }

        /* Textarea */
        #code-editor {
            flex: 1;
            width: 100%;
            background: #fffde7;
            color: #1a1a00;
            border: none;
            border-top: 1px solid #e8e0b0;
            padding: 12px 14px;
            font-family: 'Menlo', 'Consolas', 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.65;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        #compile-error {
            display: none;
            padding: 7px 14px;
            background: #fff0f0;
            color: #c00;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.68rem;
            border-top: 1px solid #fcc;
            white-space: pre-wrap;
            flex-shrink: 0;
        }

        #compile-error.visible {
            display: block;
        }

        /* ── GB screen pane ── */
        #screen-pane {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        #screen-wrap {
            position: relative;
            border: 2px solid #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0 #111;
            background: #f5f0e8;
            flex: 1;
            display: flex;
            align-items: stretch;
        }

        canvas#screen {
            image-rendering: pixelated;
            width: 480px;
            display: block;
        }

        #screen-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            background: #f5f0e8;
            color: #999;
            font-size: 0.82rem;
            pointer-events: none;
            user-select: none;
        }

        #screen-placeholder .ph-icon {
            font-size: 2.4rem;
            opacity: 0.4;
        }

        #screen-placeholder .ph-text {
            text-align: center;
            line-height: 1.8;
        }

        #screen-placeholder.hidden {
            display: none;
        }

        /* ── Terminal panel ── */
        #terminal-panel {
            width: 100%;
            max-width: 920px;
            border: 2px solid #111;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 4px 4px 0 #111;
            background: #1a1a12;
        }

        #terminal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            background: #111;
            color: #aaa;
            font-size: 0.68rem;
            font-family: 'Menlo', 'Consolas', monospace;
            letter-spacing: 0.04em;
        }

        #terminal-dots {
            display: flex;
            gap: 5px;
        }

        #terminal-dots span {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            display: inline-block;
        }

        #terminal-dots .dot-r {
            background: #ff5f56;
        }

        #terminal-dots .dot-y {
            background: #ffbd2e;
        }

        #terminal-dots .dot-g {
            background: #27c93f;
        }

        #terminal-output {
            padding: 8px 14px;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.7rem;
            line-height: 1.8;
            color: #b0c090;
            min-height: 52px;
            max-height: 120px;
            overflow-y: auto;
        }

        .term-line {
            display: block;
            white-space: pre-wrap;
        }

        .term-ok {
            color: #7ee8a2;
        }

        .term-err {
            color: #f87171;
        }

        .term-dim {
            color: #666;
        }

        .term-info {
            color: #c8f0d8;
        }

        /* ── Bottom bar ── */
        #bottom-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 920px;
        }

        #status {
            font-size: 0.75rem;
            color: #aaa;
            flex: 1;
        }

        #controls-hint {
            font-size: 0.72rem;
            color: #888;
            line-height: 1.8;
        }

        .load-rom-btn {
            background: #fff;
            border: 2px solid #111;
            border-radius: 8px;
            color: #111;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 300;
            padding: 4px 12px;
            box-shadow: 3px 3px 0 #111;
            transition: box-shadow 0.1s;
            white-space: nowrap;
        }

        .load-rom-btn:hover {
            box-shadow: 1px 1px 0 #111;
        }

        #debug-toggles {
            display: flex;
            gap: 8px;
        }

        .dbg-btn {
            background: #fff;
            border: 2px solid #111;
            border-radius: 8px;
            color: #111;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.78rem;
            font-weight: 300;
            padding: 4px 12px;
            box-shadow: 3px 3px 0 #111;
            transition: box-shadow 0.1s;
        }

        .dbg-btn:hover {
            box-shadow: 1px 1px 0 #111;
        }

        .dbg-btn.active {
            background: #111;
            color: #fff;
            box-shadow: none;
        }

        /* ── Debug panels ── */
        #debug-panels {
            display: flex;
            flex-direction: row;
            gap: 12px;
            padding: 0 24px 24px;
            width: 100%;
            max-width: 920px;
        }

        .debug-section {
            border: 2px solid #111;
            border-radius: 10px;
            padding: 10px;
            background: #fff;
            box-shadow: 4px 4px 0 #111;
            flex-shrink: 0;
        }

        .debug-section h3 {
            font-size: 0.68rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }

        canvas.debug-canvas {
            image-rendering: pixelated;
            display: block;
        }

        #tileset-canvas {
            width: 256px;
            height: 384px;
        }

        #memmap-canvas {
            width: 256px;
            height: 256px;
        }

        #ilog-section {
            min-width: 260px;
        }

        #ilog-pre {
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.65rem;
            color: #444;
            line-height: 1.5;
            max-height: 384px;
            overflow-y: auto;
            white-space: pre;
        }

        #rom-input {
            display: none;
        }
    </style>
</head>

<body>

    <div id="center-wrap">

        <!-- Main row: editor + GB screen -->
        <div id="main-row">

            <!-- Shrimp editor -->
            <div id="editor-pane">
                <div id="editor-header">
                    <span id="logo">🦐 Shrimp</span>
                    <div id="tab-bar"></div>
                    <div id="examples-wrap">
                        <button class="hdr-btn" id="examples-btn">Examples ▾</button>
                        <div id="examples-menu" class="hidden">
                            <div class="menu-item" data-example="pong">🏓 Pong</div>
                        </div>
                    </div>
                    <button class="hdr-btn" id="new-file-btn">+ New</button>
                    <button id="compile-btn" disabled>▶ Run</button>
                </div>
                <textarea id="code-editor" spellcheck="false"></textarea>
                <div id="compile-error"></div>
            </div>

            <!-- GB screen -->
            <div id="screen-pane">
                <div id="screen-wrap">
                    <canvas id="screen" width="160" height="144"></canvas>
                    <div id="screen-placeholder">
                        <div class="ph-icon">🕹️</div>
                        <div class="ph-text">
                            Press <strong>▶ Run</strong> to compile &amp; play<br />
                            or load a .gb ROM
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Terminal panel -->
        <div id="terminal-panel">
            <div id="terminal-header">
                <div id="terminal-dots">
                    <span class="dot-r"></span>
                    <span class="dot-y"></span>
                    <span class="dot-g"></span>
                </div>
                shrimp compiler — output
            </div>
            <div id="terminal-output">
                <span class="term-line term-dim">Waiting for compilation…</span>
            </div>
        </div>

        <!-- Bottom bar — fixed layout, never shifts -->
        <div id="bottom-bar">
            <div id="status">Ready.</div>
            <div id="controls-hint">
                Arrow keys: D-pad &nbsp;·&nbsp; Z: A &nbsp;·&nbsp; X: B &nbsp;·&nbsp;
                Enter: Start &nbsp;·&nbsp; Shift: Select
            </div>
            <label class="load-rom-btn" for="rom-input">Load ROM</label>
            <input type="file" id="rom-input" accept=".gb,.rom" />
            <div id="debug-toggles">
                <button class="dbg-btn" data-target="tileset-section">Tileset</button>
                <button class="dbg-btn" data-target="memmap-section">Memory</button>
                <button class="dbg-btn" data-target="ilog-section">Instructions</button>
            </div>
        </div>

    </div><!-- #center-wrap -->

    <!-- Debug panels outside center-wrap so they don't affect vertical centering -->
    <div id="debug-panels">
        <div class="debug-section" id="tileset-section" style="display:none">
            <h3>VRAM Tileset</h3>
            <canvas id="tileset-canvas" class="debug-canvas" width="128" height="192"></canvas>
        </div>
        <div class="debug-section" id="memmap-section" style="display:none">
            <h3>Memory Map</h3>
            <canvas id="memmap-canvas" class="debug-canvas" width="256" height="256"></canvas>
        </div>
        <div class="debug-section" id="ilog-section" style="display:none">
            <h3>Instructions</h3>
            <pre id="ilog-pre"></pre>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
