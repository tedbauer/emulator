<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>emulator</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300;1,400&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #c8f0d8;
            color: #111;
            font-family: 'Merriweather', Georgia, serif;
            font-weight: 300;
            font-size: 18px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            gap: 16px;
            padding: 24px;
        }

        /* ── Main row: editor left, GB screen right ── */
        #main-row {
            display: flex;
            gap: 20px;
            align-items: stretch;
        }

        /* ── Shrimp editor pane ── */
        #editor-pane {
            display: flex;
            flex-direction: column;
            width: 400px;
            border: 2px solid #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0 #111;
        }

        #shrimp-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: #111;
            color: #fff;
            flex-shrink: 0;
        }

        #shrimp-header strong {
            font-size: 0.82rem;
            font-weight: 700;
            font-style: italic;
        }

        #shrimp-header span {
            font-size: 0.75rem;
            opacity: 0.5;
            flex: 1;
        }

        #compile-btn {
            background: #c8f0d8;
            border: none;
            border-radius: 6px;
            color: #111;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.75rem;
            font-weight: 700;
            padding: 4px 12px;
            white-space: nowrap;
            transition: opacity 0.1s, transform 0.1s;
        }

        #compile-btn:hover {
            opacity: 0.85;
        }

        #compile-btn:active {
            transform: scale(0.97);
        }

        #compile-btn:disabled {
            opacity: 0.35;
            cursor: not-allowed;
        }

        #code-editor {
            flex: 1;
            width: 100%;
            background: #fffde7;
            color: #1a1a00;
            border: none;
            padding: 12px 14px;
            font-family: 'Menlo', 'Consolas', 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            line-height: 1.65;
            resize: none;
            outline: none;
            tab-size: 4;
        }

        #compile-error {
            display: none;
            padding: 7px 14px;
            background: #fff0f0;
            color: #c00;
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.68rem;
            border-top: 1px solid #fcc;
            white-space: pre-wrap;
            flex-shrink: 0;
        }

        #compile-error.visible {
            display: block;
        }

        /* ── GB screen pane ── */
        #screen-pane {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        #screen-wrap {
            border: 2px solid #111;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 4px 4px 0 #111;
            background: #111;
            flex: 1;
            display: flex;
            align-items: stretch;
        }

        canvas#screen {
            image-rendering: pixelated;
            width: 480px;
            display: block;
        }

        /* ── Bottom bar (always the same height — never shifts) ── */
        #bottom-bar {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            flex-wrap: nowrap;
        }

        #status {
            font-size: 0.78rem;
            color: #aaa;
            flex: 1;
        }

        #controls-hint {
            font-size: 0.75rem;
            color: #888;
            line-height: 1.8;
        }

        .load-rom-btn {
            background: #fff;
            border: 2px solid #111;
            border-radius: 8px;
            color: #111;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 300;
            padding: 4px 12px;
            box-shadow: 3px 3px 0 #111;
            transition: box-shadow 0.1s;
            white-space: nowrap;
        }

        .load-rom-btn:hover {
            box-shadow: 1px 1px 0 #111;
        }

        #debug-toggles {
            display: flex;
            gap: 8px;
        }

        .dbg-btn {
            background: #fff;
            border: 2px solid #111;
            border-radius: 8px;
            color: #111;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 300;
            padding: 4px 12px;
            box-shadow: 3px 3px 0 #111;
            transition: box-shadow 0.1s;
        }

        .dbg-btn:hover {
            box-shadow: 1px 1px 0 #111;
        }

        .dbg-btn.active {
            background: #111;
            color: #fff;
            box-shadow: none;
        }

        /* ── Debug panels (left to right, below main row) ── */
        #debug-panels {
            display: flex;
            flex-direction: row;
            gap: 12px;
            width: 100%;
            max-width: 900px;
        }

        .debug-section {
            border: 2px solid #111;
            border-radius: 10px;
            padding: 10px;
            background: #fff;
            box-shadow: 4px 4px 0 #111;
            flex-shrink: 0;
        }

        .debug-section h3 {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 8px;
        }

        canvas.debug-canvas {
            image-rendering: pixelated;
            display: block;
        }

        #tileset-canvas {
            width: 256px;
            height: 384px;
        }

        #memmap-canvas {
            width: 256px;
            height: 256px;
        }

        #ilog-section {
            min-width: 260px;
        }

        #ilog-pre {
            font-family: 'Menlo', 'Consolas', monospace;
            font-size: 0.65rem;
            color: #444;
            line-height: 1.5;
            max-height: 384px;
            overflow-y: auto;
            white-space: pre;
        }

        /* ── Hidden file input ── */
        #rom-input {
            display: none;
        }
    </style>
</head>

<body>

    <!-- Main row: editor + GB screen -->
    <div id="main-row">

        <!-- Shrimp editor -->
        <div id="editor-pane">
            <div id="shrimp-header">
                <strong>🦐 Shrimp</strong>
                <span>pong.s</span>
                <button id="compile-btn" disabled>▶ Compile &amp; Run</button>
            </div>
            <textarea id="code-editor" spellcheck="false"></textarea>
            <div id="compile-error"></div>
        </div>

        <!-- GB screen -->
        <div id="screen-pane">
            <div id="screen-wrap">
                <canvas id="screen" width="160" height="144"></canvas>
            </div>
        </div>

    </div>

    <!-- Bottom bar — fixed layout, never shifts -->
    <div id="bottom-bar">
        <div id="status">Load a ROM to start.</div>
        <div id="controls-hint">
            Arrow keys: D-pad &nbsp;·&nbsp; Z: A &nbsp;·&nbsp; X: B &nbsp;·&nbsp;
            Enter: Start &nbsp;·&nbsp; Shift: Select
        </div>
        <label class="load-rom-btn" for="rom-input">Load ROM</label>
        <input type="file" id="rom-input" accept=".gb,.rom" />
        <div id="debug-toggles">
            <button class="dbg-btn" data-target="tileset-section">Tileset</button>
            <button class="dbg-btn" data-target="memmap-section">Memory</button>
            <button class="dbg-btn" data-target="ilog-section">Instructions</button>
        </div>
    </div>

    <!-- Debug panels — appear left to right below main row -->
    <div id="debug-panels">
        <div class="debug-section" id="tileset-section" style="display:none">
            <h3>VRAM Tileset</h3>
            <canvas id="tileset-canvas" class="debug-canvas" width="128" height="192"></canvas>
        </div>
        <div class="debug-section" id="memmap-section" style="display:none">
            <h3>Memory Map</h3>
            <canvas id="memmap-canvas" class="debug-canvas" width="256" height="256"></canvas>
        </div>
        <div class="debug-section" id="ilog-section" style="display:none">
            <h3>Instructions</h3>
            <pre id="ilog-pre"></pre>
        </div>
    </div>

    <script type="module" src="./index.js"></script>
</body>

</html>
